<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6300458886989288"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎩 마법의 모자 — RANDOM ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08050f;--surface:#110d1a;--surface2:#1a1428;
  --accent:#c084fc;--accent2:#f59e0b;--accent3:#34d399;
  --text:#f0e8ff;--muted:#7c6a9a;--border:rgba(180,130,255,0.13);
  --gold:linear-gradient(135deg,#f59e0b,#fbbf24,#f59e0b);
  --purple:linear-gradient(135deg,#c084fc,#a855f7,#c084fc);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;max-height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* 배경 별 */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:rgba(8,5,15,0.85);backdrop-filter:blur(8px);
}
.logo{font-family:'Oswald',sans-serif;font-size:18px;font-weight:900;color:var(--accent);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}

/* 메인 영역 */
.main-wrap{display:flex;flex:1;overflow:hidden;position:relative;z-index:5;}

/* ── 무대 (왼쪽) ── */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}

/* 별빛 파티클 컨테이너 */
.sparkle-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;}

/* ── 참가자 큐 ── */
.queue-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:12px 16px;
  background:linear-gradient(to top,rgba(8,5,15,.95),transparent);
  display:flex;align-items:center;gap:8px;overflow-x:auto;
  flex-shrink:0;
}
.queue-bar::-webkit-scrollbar{height:3px;}
.queue-bar::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
.qitem{
  flex-shrink:0;padding:4px 14px;border-radius:20px;
  background:rgba(192,132,252,.1);border:1px solid var(--border);
  font-size:13px;color:var(--muted);transition:all .3s;
}
.qitem.current{
  background:rgba(192,132,252,.25);border-color:var(--accent);
  color:var(--text);transform:scale(1.1);
}
.qitem.done{opacity:.3;text-decoration:line-through;}

/* ── 마법 모자 SVG 영역 ── */
.hat-scene{
  display:flex;flex-direction:column;align-items:center;
  position:relative;
  width:340px;
}

/* 말풍선 */
.speech-bubble{
  position:absolute;
  top:-110px;left:50%;transform:translateX(-50%);
  background:rgba(17,13,26,.95);border:1.5px solid var(--accent);
  border-radius:16px;padding:14px 20px;
  font-size:14px;line-height:1.7;color:var(--text);
  text-align:center;min-width:260px;max-width:320px;
  opacity:0;transition:opacity .3s;
  box-shadow:0 0 30px rgba(192,132,252,.25);
  pointer-events:none;
}
.speech-bubble::after{
  content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  border:10px solid transparent;border-top-color:var(--accent);border-bottom:0;
  filter:drop-shadow(0 2px 4px rgba(192,132,252,.3));
}
.speech-bubble.show{opacity:1;}

/* 이름 표시 */
.current-name{
  font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--accent);margin-top:16px;min-height:32px;
  text-shadow:0 0 20px rgba(192,132,252,.5);
  transition:all .3s;
}

/* 결과 배지 (팀 배정 발표) */
.result-badge{
  margin-top:12px;
  font-family:'Oswald',sans-serif;font-size:32px;font-weight:900;letter-spacing:4px;
  opacity:0;transform:scale(0.5) translateY(20px);
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
  text-shadow:0 0 30px currentColor;
}
.result-badge.pop{opacity:1;transform:scale(1) translateY(0);}

/* 표정 */
.hat-face{font-size:28px;position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);transition:all .3s;}

/* ── 사이드바 ── */
.side{
  width:300px;background:rgba(17,13,26,.97);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.ps{padding:12px 16px;border-bottom:1px solid var(--border);}
.pt{font-family:'Black Han Sans',sans-serif;font-size:14px;letter-spacing:2px;color:var(--accent);margin-bottom:0;}

/* 팀 목록 */
.team-list{overflow-y:auto;flex:1;padding:10px;}
.team-block{margin-bottom:14px;}
.team-block-name{
  font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:2px;
  padding:6px 10px;border-radius:6px;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.team-block-name .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.member-chip{
  display:inline-block;margin:2px 3px;padding:3px 10px;
  border-radius:12px;font-size:12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  animation:chipIn .4s ease forwards;
}
@keyframes chipIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}

/* 진행 상황 */
.prog-bar-wrap{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin:10px 16px;}
.prog-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease;width:0%;}

/* 시작 오버레이 */
.overlay{
  position:absolute;inset:0;
  background:rgba(8,5,15,.93);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;
}
.ot{font-family:'Black Han Sans',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent);margin-bottom:8px;}
.os{font-size:14px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.9;}
.sbtn{
  background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;
  border:none;padding:14px 44px;border-radius:50px;
  font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:3px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 0 30px rgba(192,132,252,.3);
}
.sbtn:hover{transform:scale(1.05);box-shadow:0 8px 32px rgba(192,132,252,.5);}

/* 결과 오버레이 */
.result-overlay{
  position:absolute;inset:0;
  background:rgba(8,5,15,.96);
  display:none;flex-direction:column;align-items:center;justify-content:flex-start;
  z-index:200;padding:32px 24px;overflow-y:auto;
}
.result-overlay.show{display:flex;}
.result-title{
  font-family:'Oswald',sans-serif;font-size:28px;font-weight:900;letter-spacing:3px;
  background:var(--purple);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:24px;
}
.result-teams{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;width:100%;max-width:800px;}
.result-team-card{
  background:var(--surface);border-radius:16px;padding:18px 22px;
  min-width:160px;border-top:4px solid;flex:1;min-width:160px;max-width:220px;
  animation:cardIn .5s ease forwards;opacity:0;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.result-team-card-name{font-family:'Black Han Sans',sans-serif;font-size:15px;margin-bottom:10px;}
.result-member{font-size:13px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);}
.result-member:last-child{border:none;}
.cbtn{
  margin-top:24px;background:none;border:1px solid var(--border);
  color:var(--muted);padding:10px 28px;border-radius:8px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:all .2s;
}
.cbtn:hover{color:var(--text);border-color:#aaa;}

/* 빠레 파티클 */
.confetti{
  position:absolute;width:8px;height:12px;border-radius:2px;
  animation:confettiFall linear forwards;
  pointer-events:none;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(80vh) rotate(720deg);opacity:0;}
}

/* 모자 흔들림 */
@keyframes hatWiggle{
  0%,100%{transform:rotate(0deg);}
  20%{transform:rotate(-6deg);}
  40%{transform:rotate(8deg);}
  60%{transform:rotate(-5deg);}
  80%{transform:rotate(4deg);}
}
@keyframes hatShake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-8px);}
  75%{transform:translateX(8px);}
}
@keyframes hatPulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(192,132,252,.4));}
  50%{filter:drop-shadow(0 0 28px rgba(192,132,252,.9));}
}
.hat-anim-think{animation:hatWiggle .5s ease infinite;}
.hat-anim-shake{animation:hatShake .15s ease infinite;}
.hat-anim-pulse{animation:hatPulse 1s ease infinite;}

/* 마법 글자 이펙트 */
@keyframes textGlow{
  0%,100%{text-shadow:0 0 8px rgba(192,132,252,.4);}
  50%{text-shadow:0 0 24px rgba(192,132,252,1),0 0 48px rgba(192,132,252,.6);}
}
.glow-text{animation:textGlow 1.5s ease infinite;}

/* 스킵 버튼 */
.skip-btn{
  position:absolute;bottom:80px;right:20px;
  background:rgba(17,13,26,.75);border:1px solid rgba(180,130,255,.2);
  color:var(--muted);padding:5px 14px 5px 10px;border-radius:20px;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;
  display:flex;align-items:center;gap:5px;
  transition:all .2s;z-index:20;
  backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;
  transform:translateY(4px);
}
.skip-btn.visible{opacity:1;pointer-events:auto;transform:translateY(0);}
.skip-btn:hover{border-color:rgba(180,130,255,.5);color:var(--text);}
.skip-btn svg{transition:transform .2s;}
.skip-btn:hover svg{transform:translateX(2px);}

/* 모바일 */
@media(max-width:768px){
  .side{width:220px;}
  .hat-scene{width:260px;}
  .speech-bubble{min-width:200px;font-size:13px;}
}
@media(max-width:600px){
  .side{display:none;}
  .hat-scene{width:300px;}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<header>
  <div class="logo">🎩 마법의 모자</div>
  <div style="font-size:13px;color:var(--muted);" id="roundDisplay">준비중...</div>
  <button class="back-btn" onclick="location.href='index.html'">← 돌아가기</button>
</header>

<div class="main-wrap">
  <!-- 무대 -->
  <div class="stage" id="stage">
    <div class="sparkle-layer" id="sparkleLayer"></div>

    <!-- 시작 오버레이 -->
    <div class="overlay" id="startOverlay">
      <div style="font-size:64px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(192,132,252,.6))">🎩</div>
      <div class="ot">마법의 모자</div>
      <div class="os" id="pInfo">참가자 0명<br>마법의 모자가 팀을 정해드립니다!</div>
      <button class="sbtn" onclick="startGame()">🎩 시작!</button>
    </div>

    <!-- 결과 오버레이 -->
    <div class="result-overlay" id="resultOverlay">
      <div class="result-title">🎩 팀 배정 완료!</div>
      <div class="result-teams" id="resultTeams"></div>
      <button class="cbtn" onclick="document.getElementById('resultOverlay').classList.remove('show')">✕ 닫기</button>
    </div>

    <!-- 모자 씬 -->
    <div class="hat-scene" id="hatScene">
      <div class="speech-bubble" id="speechBubble"></div>
      <div style="position:relative;width:220px;height:200px;" id="hatWrapper">
        <!-- SVG 마법 모자 -->
        <svg id="hatSvg" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" style="width:220px;height:200px;">
          <!-- 그림자 -->
          <ellipse cx="110" cy="190" rx="80" ry="10" fill="rgba(0,0,0,0.4)"/>
          <!-- 모자 챙 -->
          <ellipse cx="110" cy="158" rx="88" ry="18" fill="#1a0f2e" stroke="#7c3aed" stroke-width="2"/>
          <ellipse cx="110" cy="155" rx="82" ry="13" fill="#2d1b4e"/>
          <!-- 모자 몸통 -->
          <path d="M 38 155 L 52 50 L 168 50 L 182 155 Z" fill="#1a0f2e"/>
          <path d="M 40 155 L 54 52 L 166 52 L 180 155 Z" fill="url(#hatGrad)"/>
          <!-- 별 무늬 장식 -->
          <text x="68" y="100" font-size="14" fill="rgba(192,132,252,0.5)">✦</text>
          <text x="120" y="90" font-size="10" fill="rgba(245,158,11,0.5)">★</text>
          <text x="145" y="108" font-size="12" fill="rgba(192,132,252,0.4)">✦</text>
          <text x="58" y="130" font-size="9" fill="rgba(245,158,11,0.4)">✧</text>
          <text x="148" y="135" font-size="9" fill="rgba(192,132,252,0.4)">✧</text>
          <!-- 모자 띠 -->
          <rect x="38" y="130" width="144" height="18" rx="3" fill="#7c3aed" opacity="0.7"/>
          <rect x="38" y="130" width="144" height="18" rx="3" fill="url(#bandGrad)" opacity="0.5"/>
          <!-- 버클 -->
          <rect x="96" y="132" width="28" height="14" rx="3" fill="#f59e0b" opacity="0.9"/>
          <rect x="100" y="135" width="20" height="8" rx="2" fill="none" stroke="#1a0f2e" stroke-width="1.5"/>
          <!-- 모자 꼭대기 -->
          <ellipse cx="110" cy="50" rx="58" ry="12" fill="#2d1b4e" stroke="#7c3aed" stroke-width="1.5"/>
          <!-- 글로우 테두리 -->
          <path d="M 40 155 L 54 52" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
          <path d="M 180 155 L 166 52" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
          <!-- 표정 영역 (텍스트로 넣음) -->
          <text id="hatFace" x="110" y="128" font-size="26" text-anchor="middle" dominant-baseline="middle">😐</text>
          <!-- 마법 빛 -->
          <circle id="magicGlow" cx="110" cy="50" r="0" fill="rgba(192,132,252,0)" opacity="0">
            <animate attributeName="r" values="0;30;0" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite"/>
          </circle>
          <defs>
            <linearGradient id="hatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2d1b4e"/>
              <stop offset="50%" style="stop-color:#1e1035"/>
              <stop offset="100%" style="stop-color:#2d1b4e"/>
            </linearGradient>
            <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0"/>
              <stop offset="50%" style="stop-color:#c084fc;stop-opacity:0.6"/>
              <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="current-name" id="currentName"></div>
      <div class="result-badge" id="resultBadge"></div>
    </div>

    <!-- 참가자 큐 -->
    <div class="queue-bar" id="queueBar"></div>
    <!-- 진행바 -->
    <div class="prog-bar-wrap" style="position:absolute;bottom:62px;left:0;right:0;margin:0 0;">
      <div class="prog-bar" id="progBar"></div>
    </div>
    <!-- 스킵 버튼 -->
    <button class="skip-btn" id="skipBtn" onclick="skipMurmur()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2L7 6L2 10V2Z" fill="currentColor"/>
        <rect x="8" y="2" width="2" height="8" rx="1" fill="currentColor"/>
      </svg>
      건너뛰기
    </button>
  </div>

  <!-- 사이드바 -->
  <div class="side">
    <div class="ps"><div class="pt">🎩 팀 배정 현황</div></div>
    <div class="team-list" id="teamList"></div>
  </div>
</div>

<script>
// ── 배경 별 ──
const bgCanvas=document.getElementById('bgCanvas');
const bctx=bgCanvas.getContext('2d');
function resizeBg(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;}
resizeBg();window.addEventListener('resize',resizeBg);
const stars=Array.from({length:120},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.2+.2,speed:Math.random()*.2+.05,opacity:Math.random()}));
function drawBg(){bctx.clearRect(0,0,bgCanvas.width,bgCanvas.height);stars.forEach(s=>{s.opacity+=.008;if(s.opacity>1)s.opacity=0;bctx.beginPath();bctx.arc(s.x,s.y,s.r,0,Math.PI*2);bctx.fillStyle=`rgba(180,140,255,${s.opacity*.5})`;bctx.fill();});requestAnimationFrame(drawBg);}
drawBg();

// ── URL 파라미터 ──
const params=new URLSearchParams(location.search);
const names=params.get('names')?params.get('names').split(',').filter(Boolean):['김철수','이영희','박준우','최지수','한태양','강민준'];
const teamParam=params.get('teams');
let teams=[];
if(teamParam){
  try{teams=JSON.parse(decodeURIComponent(teamParam));}catch(e){}
}
if(!teams.length){
  // 기본 팀
  const COLORS=['#FF6B6B','#4D96FF','#6BCB77','#FFD93D','#FF6FC8','#FF9A3C','#C77DFF','#00D4FF'];
  teams=[{name:'A팀',color:COLORS[0]},{name:'B팀',color:COLORS[1]}];
}

document.getElementById('pInfo').innerHTML=`참가자 ${names.length}명 · ${teams.length}개 팀<br>마법의 모자가 한 명씩 팀을 배정합니다!`;

// 팀별 멤버 초기화
teams.forEach(t=>{t.members=[];});
let shuffled=[...names].sort(()=>Math.random()-.5);
let queue=[...shuffled];
let currentIdx=0;
let isRunning=false;
let assignResults=[]; // {name, teamIdx}
let skipRequested=false; // 스킵 플래그

// ── 스킵 버튼 ──
function setSkipVisible(v){
  const btn=document.getElementById('skipBtn');
  if(v) btn.classList.add('visible');
  else btn.classList.remove('visible');
}
function skipMurmur(){
  skipRequested=true;
}

// ── 사이드바 팀 목록 렌더 ──
function renderTeamList(){
  document.getElementById('teamList').innerHTML=teams.map((t,i)=>`
    <div class="team-block">
      <div class="team-block-name">
        <div class="dot" style="background:${t.color}"></div>
        <span style="color:${t.color}">${t.name}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:auto;">${t.members.length}명</span>
      </div>
      <div>${t.members.map(m=>`<span class="member-chip" style="border-color:${t.color}33;color:${t.color}">${m}</span>`).join('')}</div>
    </div>`).join('');
}

// ── 큐 바 렌더 ──
function renderQueue(){
  document.getElementById('queueBar').innerHTML=queue.map((n,i)=>`
    <div class="qitem ${i===currentIdx?'current':i<currentIdx?'done':''}">${n}</div>`).join('');
  // 현재 항목으로 스크롤
  const bar=document.getElementById('queueBar');
  const cur=bar.querySelectorAll('.qitem')[currentIdx];
  if(cur)cur.scrollIntoView({inline:'center',behavior:'smooth'});
}

// ── 진행바 업데이트 ──
function updateProgress(){
  const pct=(currentIdx/queue.length)*100;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('roundDisplay').textContent=`${currentIdx} / ${queue.length} 명 완료`;
}

// ── 말풍선 ──
const MURMURS=[

  // ─── [클래식 & 기존 스타일] ───
  "흠... 머리가 비상하지만,\n때론 멍청할 때가 있군..",
  "머리가 매우 가볍고,\n얍삽하게 게임 하는 것을 좋아하는 군..",

const FACES_EXCITED=['😮','😲','🤩','😆','🥵'];

function pickMurmurs(){
  const count=3+Math.floor(Math.random()*3); // 3~5개
  const pool=[...MURMURS].sort(()=>Math.random()-.5);
  return pool.slice(0,count);
}

// ── 마법 별 파티클 스파클 ──
function spawnSparkle(){
  const layer=document.getElementById('sparkleLayer');
  const el=document.createElement('div');
  const symbols=['✦','✧','★','✨','⋆','·'];
  el.textContent=symbols[Math.floor(Math.random()*symbols.length)];
  el.style.cssText=`
    position:absolute;
    left:${20+Math.random()*60}%;
    top:${10+Math.random()*70}%;
    font-size:${10+Math.random()*18}px;
    color:rgba(192,132,252,${0.4+Math.random()*0.6});
    pointer-events:none;
    animation:sparkleAnim ${0.8+Math.random()*0.8}s ease forwards;
  `;
  if(!document.getElementById('sparkleStyle')){
    const s=document.createElement('style');
    s.id='sparkleStyle';
    s.textContent=`@keyframes sparkleAnim{0%{opacity:0;transform:scale(0) translateY(0);}50%{opacity:1;transform:scale(1.3) translateY(-10px);}100%{opacity:0;transform:scale(0.5) translateY(-24px);}}`;
    document.head.appendChild(s);
  }
  layer.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// ── 빠레 폭죽 ──
function launchConfetti(colors){
  const stage=document.getElementById('stage');
  const confColors=colors||['#c084fc','#f59e0b','#34d399','#ff6b6b','#4d96ff','#fbbf24'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      el.style.cssText=`
        left:${20+Math.random()*60}%;
        top:0;
        background:${confColors[Math.floor(Math.random()*confColors.length)]};
        width:${6+Math.random()*8}px;height:${8+Math.random()*12}px;
        border-radius:${Math.random()<.5?'50%':'2px'};
        animation-duration:${1.5+Math.random()*1.5}s;
        animation-delay:${Math.random()*0.5}s;
      `;
      stage.appendChild(el);
      setTimeout(()=>el.remove(),3000);
    },i*30);
  }
}

// ── 오디오 ──
const AC=new(window.AudioContext||window.webkitAudioContext)();
function sfx(f,d,t='sine',v=.2){
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}
}
function playThink(){sfx(200+Math.random()*100,.3,'triangle',.15);}
function playReveal(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,.2,'sine',.3),i*100));}
function playFanfare(){
  const melody=[523,659,784,880,1047,880,784,1047];
  melody.forEach((f,i)=>setTimeout(()=>sfx(f,.15,'triangle',.35),i*90));
}

// ── 메인 배정 로직 ──
function assignNext(){
  if(currentIdx>=queue.length){
    setTimeout(showFinalResult,800);
    return;
  }
  const name=queue[currentIdx];
  isRunning=true;

  // 이름 표시
  document.getElementById('currentName').textContent=name;
  document.getElementById('currentName').classList.add('glow-text');

  // 팀 결정 (균등 배분)
  const teamIdx=pickTeam();

  // 상태 초기화
  const badge=document.getElementById('resultBadge');
  badge.classList.remove('pop');
  badge.textContent='';

  const bubble=document.getElementById('speechBubble');
  bubble.classList.remove('show');
  bubble.textContent='';

  skipRequested=false;
  renderQueue();
  updateProgress();

  // 스파클 인터벌
  let sparkleInterval=setInterval(spawnSparkle,120);

  // 1단계: 모자 고민 시작
  setHatAnim('hat-anim-think');
  setHatFace(FACES_THINK[Math.floor(Math.random()*FACES_THINK.length)]);
  playThink();

  const murmurs=pickMurmurs();
  let mIdx=0;

  // 스킵 버튼 표시
  setSkipVisible(true);

  function showNextMurmur(){
    // 스킵 요청됐으면 바로 announce로
    if(skipRequested){
      setSkipVisible(false);
      clearInterval(sparkleInterval);
      bubble.classList.remove('show');
      setTimeout(announce,200);
      return;
    }
    if(mIdx>=murmurs.length){
      // 모든 대사 끝 → 결정!
      setSkipVisible(false);
      clearInterval(sparkleInterval);
      bubble.classList.remove('show');
      setTimeout(announce,200);
      return;
    }
    bubble.textContent=murmurs[mIdx].replace(/\n/g,' ');
    bubble.classList.add('show');
    // 가끔 표정 바꾸기
    if(Math.random()<.5) setHatFace(FACES_THINK[Math.floor(Math.random()*FACES_THINK.length)]);
    if(Math.random()<.3) setHatAnim('hat-anim-shake');
    else setHatAnim('hat-anim-think');
    playThink();
    mIdx++;
    setTimeout(showNextMurmur,1400+Math.random()*600);
  }

  setTimeout(showNextMurmur,600);

  function announce(){
    // 결정 표정
    setHatFace(FACES_EXCITED[Math.floor(Math.random()*FACES_EXCITED.length)]);
    setHatAnim('hat-anim-pulse');
    bubble.classList.remove('show');

    setTimeout(()=>{
      // 팀 이름 발표!
      playFanfare();
      launchConfetti([teams[teamIdx].color,'#c084fc','#f59e0b','#ffffff']);
      setHatFace(FACES_DECIDED[Math.floor(Math.random()*FACES_DECIDED.length)]);
      setHatAnim('');

      badge.style.color=teams[teamIdx].color;
      badge.textContent=teams[teamIdx].name;
      badge.classList.add('pop');

      // 멤버 등록
      teams[teamIdx].members.push(name);
      assignResults.push({name,teamIdx});
      renderTeamList();

      // 다음으로
      currentIdx++;
      updateProgress();

      setTimeout(()=>{
        badge.classList.remove('pop');
        document.getElementById('currentName').classList.remove('glow-text');
        isRunning=false;
        if(currentIdx<queue.length){
          setTimeout(assignNext,400);
        } else {
          updateProgress();
          setTimeout(showFinalResult,800);
        }
      },2000);
    },400);
  }
}

// ── 팀 균등 배분 ──
function pickTeam(){
  // 가장 적은 팀에 배정
  let minCount=Infinity,minIdx=0;
  teams.forEach((t,i)=>{if(t.members.length<minCount){minCount=t.members.length;minIdx=i;}});
  // 동률이면 랜덤
  const minTeams=teams.reduce((acc,t,i)=>{if(t.members.length===minCount)acc.push(i);return acc;},[]);
  return minTeams[Math.floor(Math.random()*minTeams.length)];
}

// ── 최종 결과 ──
function showFinalResult(){
  document.getElementById('resultTeams').innerHTML=teams.map((t,i)=>`
    <div class="result-team-card" style="border-top-color:${t.color};animation-delay:${i*0.12}s">
      <div class="result-team-card-name" style="color:${t.color}">${t.name} <span style="font-size:12px;color:var(--muted)">(${t.members.length}명)</span></div>
      ${t.members.map(m=>`<div class="result-member">👤 ${m}</div>`).join('')}
    </div>`).join('');
  document.getElementById('resultOverlay').classList.add('show');
  playFanfare();
  launchConfetti();
}

// ── 게임 시작 ──
function startGame(){
  AC.resume();
  document.getElementById('startOverlay').style.display='none';
  renderTeamList();
  renderQueue();
  updateProgress();
  setTimeout(assignNext,600);
}

// 초기 렌더
renderQueue();
</script>
</body>
</html>
