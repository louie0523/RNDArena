<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 경마 — RANDOM ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#020c01;--surface:#071503;--surface2:#0e2206;--accent:#7fff00;--gold:#f5c518;--text:#e8f5e0;--muted:#5a7a50;--border:rgba(100,200,50,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(0,0,0,0.6);}
.logo{font-family:'Oswald',sans-serif;font-size:20px;font-weight:900;color:var(--accent);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
.back-btn:hover{color:var(--text);}
.game-wrap{display:flex;flex:1;overflow:hidden;}
canvas#raceCanvas{
  display: block;
  width: 100%;       /* 👈 원하는 비율(%)이나 고정 크기(px)로 설정 */
  height: 100%;    /* 세로는 꽉 차게 유지 */
  margin: 0 auto;   /* 남는 공간이 있을 때 중앙으로 배치 */
}
.side{width:250px;background:rgba(7,21,3,0.97);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.ps{padding:13px 18px;border-bottom:1px solid var(--border);}
.pt{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:2px;color:var(--accent);margin-bottom:9px;}
.rank-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;padding:10px;}
.ri{display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(255,255,255,.04);border-radius:9px;font-size:15px;transition:all .3s;border-left:3px solid transparent;}
.ri.done{background:rgba(127,255,0,.09);border-left-color:var(--accent);}
.ri-rank{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;min-width:38px;}
.ri-name{flex:1;font-size:15px;}
.evt-wrap{flex-shrink:0;border-top:1px solid var(--border);display:flex;flex-direction:column;min-height:500px;max-height:500px;}
.event-log{flex:1;overflow-y:auto;display:flex;flex-direction:column-reverse;padding:12px;}
.log{font-size:14px;color:var(--muted);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);line-height:1.6;}
.log.evt{color:#ffcc00;}.log.skill{color:#ff6aff;}.log.arrive{color:var(--accent);}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
.spd-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px;}

/* ── 모바일 가로 강제 ── */
@media(max-width:768px) and (orientation:portrait){
  body{transform:rotate(90deg);transform-origin:left top;width:100vh;height:100vw;overflow:hidden;position:absolute;top:0;left:100%;}
}
@media(max-width:900px){
  .side{width:240px;}
  .ri{font-size:13px;}
  .log{font-size:13px;}
  .ri-rank{font-size:15px;min-width:30px;}
  .ri-name{font-size:13px;}
}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
.ot{font-family:'Black Han Sans',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent);margin-bottom:8px;}
.os{font-size:14px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.7;}
.sbtn{background:linear-gradient(135deg,#7fff00,#32cd32);color:#000;border:none;padding:14px 44px;border-radius:50px;font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.sbtn:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(127,255,0,.5);}
.result-overlay{position:absolute;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:200;padding:24px;overflow-y:auto;}
.result-overlay.show{display:flex;}
.rtitle{font-family:'Oswald',sans-serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,#f5c518,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px;}
.res-item{display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:6px;background:rgba(255,255,255,.05);border-radius:10px;width:100%;max-width:420px;animation:sli .3s ease forwards;opacity:0;}
@keyframes sli{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.cbtn{margin-top:16px;background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted);padding:10px 28px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cbtn:hover{color:var(--text);}
.game-container{position:relative;flex:1;display:flex;}
</style>
</head>
<body>
<header>
  <div class="logo">🏇 경마 레이스</div>
  <div style="font-size:13px;color:var(--muted);" id="lapDisplay">준비중...</div>
  <button class="back-btn" onclick="location.href='index.html'">← 돌아가기</button>
</header>
<div class="game-wrap">
  <div class="game-container">
    <canvas id="raceCanvas"></canvas>
    <div class="overlay" id="startOverlay">
      <div class="ot">🏇 경마 레이스</div>
      <div class="os" id="pInfo">참가자 0명</div>
      <button class="sbtn" onclick="startGame()">🚩 출발!</button>
    </div>
    <div class="result-overlay" id="resultOverlay">
      <div class="rtitle">🏆 경마 결과!</div>
      <div id="resultItems"></div>
      <button class="cbtn" onclick="document.getElementById('resultOverlay').classList.remove('show')">✕ 닫기</button>
    </div>
  </div>
  <div class="side">
    <div class="ps">
      <div class="pt">⚡ 속도</div>
      <input type="range" id="spd" min="0.05" max="3" step="0.05" value="0.5">
      <div class="spd-row"><span>느림</span><span id="spdLabel">0.5x</span><span>빠름</span></div>
    </div>
    <div class="ps"><div class="pt">🏆 순위</div></div>
    <div class="rank-list" id="rankList"></div>
    <div class="evt-wrap">
      <div class="ps" style="padding:8px 14px;"><div class="pt" style="margin-bottom:0">📢 이벤트</div></div>
      <div class="event-log" id="evtLog"></div>
    </div>
  </div>
</div>

<script>
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=0.3){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);o.start();o.stop(AC.currentTime+dur);}catch(e){}}
function playStart(){beep(440,.1,'square',.4);setTimeout(()=>beep(550,.1,'square',.4),120);setTimeout(()=>beep(660,.3,'square',.5),240);}
function playFinish(){[880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,.2,'triangle',.5),i*80));}
function playSkill(){beep(200,.05,'sawtooth',.3);setTimeout(()=>beep(400,.05,'sawtooth',.3),50);setTimeout(()=>beep(800,.3,'sawtooth',.4),100);}
function playEvent(){beep(300,.15,'square',.25);}
function playKick(){beep(150,.1,'sawtooth',.35);setTimeout(()=>beep(100,.15,'sawtooth',.2),80);}

const params = new URLSearchParams(location.search);
const names = params.get('names')?params.get('names').split(',').filter(Boolean):['철수','영희','민준','지수','태양'];
const usePass = params.get('usePass')==='true';
const passN = parseInt(params.get('passN'))||3;
document.getElementById('pInfo').innerHTML=`참가자 ${names.length}명<br>트랙을 돌며 먼저 결승선 통과 순으로 순위 결정!`;

const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
let W,H,CX,CY,RX,RY;
function resize(){const c=canvas.parentElement;W=canvas.width=c.clientWidth;H=canvas.height=c.clientHeight;CX=W/2;CY=H/2;RX=W*0.38;RY=H*0.38;}
resize();
window.addEventListener('resize',resize);

const COLORS=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FC8','#FF9A3C','#C77DFF','#00D4FF','#FF4D6D','#2EC4B6','#FF8C42','#ACE894'];
const HORSE_EMOJIS=['🏇','🐴','🦄','🐎','🏇','🐴','🦄','🐎','🏇','🐴','🦄','🐎'];
const TOTAL_LAPS=3;

let horses=[],arrived=[],gameRunning=false,gameFinished=false,frameId=null,lastEventTime=0;
let glowParticles=[];

// 스피드 슬라이더 실시간
const spdEl=document.getElementById('spd');
const spdLbl=document.getElementById('spdLabel');
spdEl.addEventListener('input',()=>{spdLbl.textContent=parseFloat(spdEl.value).toFixed(2).replace(/\.?0+$/,'')+'x';});

function getSpeed(){return parseFloat(spdEl.value);}

function createHorses(){
  horses=names.map((name,i)=>({
    name,i,
    angle:-Math.PI/2+i*0.02,
    lap:0,progress:0,
    baseSpeed:0.004+Math.random()*0.002,
    speedMult:1,speedChangeTimer:0,speedChangePeriod:80+Math.random()*120,
    color:COLORS[i%COLORS.length],emoji:HORSE_EMOJIS[i%HORSE_EMOJIS.length],
    skillReady:false,skillActive:false,skillTimer:0,
    arrived:false,rank:0,
    eventState:'normal',eventTimer:0,sleepBoostPending:false,
    trailPoints:[],shake:0,
    glowIntensity:0,
  }));
  const sc=1+Math.floor(names.length/10);
  shuffle(horses.map((_,i)=>i)).slice(0,sc).forEach(i=>{horses[i].skillReady=true;});
}

function trackPos(angle,offset=0){return{x:CX+(RX+offset)*Math.cos(angle),y:CY+(RY+offset)*Math.sin(angle)};}

function addLog(msg,type=''){
  const log=document.getElementById('evtLog');
  const el=document.createElement('div');
  el.className='log'+(type?' '+type:'');
  el.textContent=msg;
  log.prepend(el);
  if(log.children.length>50)log.removeChild(log.lastChild);
}

function updateRankPanel(){
  const sorted=[...horses].sort((a,b)=>{
    if(a.arrived!==b.arrived)return a.arrived?-1:1;
    return(b.lap+b.progress)-(a.lap+a.progress);
  });
  document.getElementById('rankList').innerHTML=sorted.map((h,i)=>{
    const rank=h.arrived?h.rank:null;
    const sym=rank?(rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}위`):`${i+1}위권`;
    return`<div class="ri ${h.arrived?'done':''}">
      <div class="ri-rank" style="color:${h.color}">${sym}</div>
      <div class="ri-name">${h.name} ${h.eventState==='toilet'?'🚽':h.eventState==='sleep'?'😴':h.skillActive?'⚡':''}</div>
      <div style="font-size:13px;color:var(--muted);">${h.arrived?'완주':`${Math.floor((h.lap/TOTAL_LAPS)*100)}%`}</div>
    </div>`;
  }).join('');
  document.getElementById('lapDisplay').textContent=`🏁 ${arrived.length}/${horses.length}마리 완주`;
}

let lastEventIdx=-1;
function tryEvent(){
  const now=Date.now();
  if(now-lastEventTime<3000)return;
  const active=horses.filter(h=>!h.arrived&&h.eventState==='normal');
  if(active.length<2)return;
  if(Math.random()>0.015)return;
  lastEventTime=now;
  const target=active[Math.floor(Math.random()*active.length)];
  const roll=Math.random();
  if(roll<0.33){target.eventState='toilet';target.eventTimer=180;addLog(`🚽 ${target.name}의 말이 갑자기 화장실로!`,'evt');playEvent();}
  else if(roll<0.66){
    target.eventState='kick';target.eventTimer=60;addLog(`🦵 ${target.name}의 말이 뒷발차기!`,'evt');playKick();
    const near=active.filter(h=>h!==target).sort((a,b)=>Math.abs(a.angle-target.angle)-Math.abs(b.angle-target.angle))[0];
    if(near){near.angle-=0.15;near.progress-=0.015;near.shake=20;addLog(`  ↳ ${near.name}의 말이 밀렸습니다!`,'evt');}
  }else{target.eventState='sleep';target.eventTimer=150;target.sleepBoostPending=true;addLog(`😴 ${target.name}의 말이 낮잠 기력 회복!`,'evt');playEvent();}
}

let lastSkillTime=0;
function trySkill(){
  const now=Date.now();
  if(now-lastSkillTime<4000)return;
  const candidates=horses.filter(h=>!h.arrived&&h.skillReady&&!h.skillActive&&h.eventState==='normal');
  if(!candidates.length)return;
  if(Math.random()>0.003)return;
  const h=candidates[Math.floor(Math.random()*candidates.length)];
  h.skillActive=true;h.skillTimer=240;lastSkillTime=now;
  addLog(`💥 ${h.name} 필살기! 폭발 가속!`,'skill');playSkill();
}

// 파티클 시스템
function spawnGlow(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    glowParticles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c:color,r:2+Math.random()*4,life:1,d:.03+Math.random()*.04});
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // 배경 — 그라데이션 잔디
  const bgGrad=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H));
  bgGrad.addColorStop(0,'#0d2209');bgGrad.addColorStop(1,'#020c01');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // 별빛 (작은 점들)
  ctx.fillStyle='rgba(200,255,180,0.15)';
  for(let i=0;i<40;i++){
    const sx=(i*137.5)%W,sy=(i*89.3)%H;
    ctx.beginPath();ctx.arc(sx,sy,0.7,0,Math.PI*2);ctx.fill();
  }

  // 잔디 줄무늬
  for(let y=0;y<H;y+=40){
    ctx.fillStyle=y%80===0?'rgba(30,60,10,0.25)':'rgba(15,35,5,0.15)';
    ctx.fillRect(0,y,W,40);
  }

  // 외곽 트랙 글로우
  ctx.shadowColor='rgba(127,255,0,0.2)';ctx.shadowBlur=30;
  drawTrackOval(RX+40,RY+40,'rgba(50,120,20,0.6)',0,true,'#061404');
  ctx.shadowBlur=0;

  // 트랙 면 (모래)
  drawTrackFace();

  // 트랙 테두리 (외)
  ctx.shadowColor='rgba(127,255,0,0.5)';ctx.shadowBlur=12;
  drawTrackOval(RX+40,RY+40,'rgba(127,255,0,0.5)',3);
  ctx.shadowBlur=0;

  // 트랙 테두리 (내)
  ctx.shadowColor='rgba(127,255,0,0.3)';ctx.shadowBlur=8;
  drawTrackOval(RX-40,RY-40,'rgba(127,255,0,0.35)',2);
  ctx.shadowBlur=0;

  // 레인 구분선
  const laneCount=Math.min(horses.length,8);
  for(let l=1;l<laneCount;l++){
    const off=-35+l*(70/laneCount);
    drawTrackOval(RX+off,RY+off,'rgba(255,255,255,0.05)',1);
  }

  // 결승선 — 체크무늬 스타일
  const finishAngle=-Math.PI/2;
  const fp1=trackPos(finishAngle,-44);
  const fp2=trackPos(finishAngle,44);
  const finishDx=fp2.x-fp1.x,finishDy=fp2.y-fp1.y;
  const finishLen=Math.sqrt(finishDx*finishDx+finishDy*finishDy);
  const steps=8;
  for(let k=0;k<steps;k++){
    const t0=k/steps,t1=(k+1)/steps;
    ctx.beginPath();
    ctx.moveTo(fp1.x+finishDx*t0,fp1.y+finishDy*t0);
    ctx.lineTo(fp1.x+finishDx*t1,fp1.y+finishDy*t1);
    ctx.strokeStyle=k%2===0?'rgba(245,197,24,0.9)':'rgba(255,255,255,0.7)';
    ctx.lineWidth=6;ctx.stroke();
  }
  ctx.fillStyle='rgba(245,197,24,0.9)';
  ctx.font='bold 14px "Noto Sans KR"';ctx.textAlign='center';
  ctx.fillText('🏁',(fp1.x+fp2.x)/2,(fp1.y+fp2.y)/2-20);

  // 글로우 파티클
  glowParticles=glowParticles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=p.d;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life*0.7;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.c;ctx.fill();
    return true;
  });
  ctx.globalAlpha=1;

  // 말 트레일
  horses.forEach(h=>{
    if(h.arrived)return;
    h.trailPoints.forEach((pt,i)=>{
      const alpha=(i/h.trailPoints.length)*0.35;
      const r2=5*(i/h.trailPoints.length);
      if(r2<0.5)return;
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.arc(pt.x,pt.y,r2,0,Math.PI*2);
      ctx.fillStyle=h.color;ctx.fill();
    });
    ctx.globalAlpha=1;
  });

  // 말 그리기
  horses.forEach((h,hi)=>{
    if(h.arrived)return;
    const laneOffset=-30+hi*(60/Math.max(1,names.length-1));
    const pos=trackPos(h.angle,laneOffset);
    const shakeX=h.shake>0?(Math.random()-0.5)*6:0;

    ctx.save();
    ctx.translate(pos.x+shakeX,pos.y);
    if(h.eventState==='sleep')ctx.globalAlpha=0.55;

    // 글로우 링 (스킬/이벤트)
    if(h.skillActive){
      ctx.shadowColor=h.color;ctx.shadowBlur=20+Math.sin(Date.now()/80)*8;
      ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);
      ctx.strokeStyle=h.color+'88';ctx.lineWidth=2;ctx.stroke();
      ctx.shadowBlur=0;
      spawnGlow(pos.x,pos.y,h.color,1);
    }

    // 이름 배경
    ctx.fillStyle='rgba(0,0,0,0.8)';
    const nw=h.name.length*8+18;
    ctx.beginPath();ctx.roundRect(-nw/2,-36,nw,20,5);ctx.fill();
    ctx.fillStyle=h.color;
    ctx.font='bold 12px "Noto Sans KR"';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(h.name.length>6?h.name.slice(0,5)+'…':h.name,0,-35);

    // 말 이모지 (크게)
    ctx.font='24px serif';
    ctx.textBaseline='middle';
    if(h.skillActive){
      for(let k=1;k<=3;k++){ctx.globalAlpha=0.25/k;ctx.fillText(h.emoji,-k*10,0);}
      ctx.globalAlpha=h.eventState==='sleep'?0.55:1;
    }
    ctx.fillText(h.eventState==='toilet'?'🚽':h.eventState==='sleep'?'😴':h.emoji,0,0);
    if(h.eventState==='kick'){ctx.font='16px serif';ctx.fillText('💥',16,-10);}
    if(h.skillActive){ctx.font='14px serif';ctx.fillText('⚡',16,-14);ctx.fillText('⚡',-16,-14);}

    ctx.restore();
  });

  // 완주 말 (내부 원에 표시)
  arrived.forEach((h,i)=>{
    const x=CX-arrived.length*20+i*40;
    const y=CY+10;
    ctx.save();
    ctx.shadowColor=h.color;ctx.shadowBlur=10;
    ctx.font='20px serif';ctx.textAlign='center';
    ctx.fillText(h.emoji,x,y-18);
    ctx.shadowBlur=0;
    ctx.fillStyle=h.color;ctx.font='bold 13px "Noto Sans KR"';
    ctx.fillText(i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`,x,y+4);
    ctx.restore();
  });
}

function drawTrackOval(rx,ry,strokeColor,lw,fill=false,fillColor=''){
  ctx.beginPath();ctx.ellipse(CX,CY,rx,ry,0,0,Math.PI*2);
  if(fill){ctx.fillStyle=fillColor;ctx.fill();}
  if(lw>0){ctx.strokeStyle=strokeColor;ctx.lineWidth=lw;ctx.stroke();}
}
function drawTrackFace(){
  ctx.beginPath();
  ctx.ellipse(CX,CY,RX+40,RY+40,0,0,Math.PI*2);
  ctx.ellipse(CX,CY,RX-40,RY-40,0,0,Math.PI*2);
  // 모래 그라데이션
  const sg=ctx.createRadialGradient(CX,CY,RY-40,CX,CY,RY+40);
  sg.addColorStop(0,'rgba(40,70,15,0.6)');sg.addColorStop(1,'rgba(60,100,20,0.5)');
  ctx.fillStyle=sg;ctx.fill('evenodd');
}

let spdAccum=0;
function update(){
  const spd=getSpeed();
  spdLbl.textContent=spd.toFixed(2).replace(/\.?0+$/,'')+'x';
  tryEvent();trySkill();

  // 속도 누적 방식 (ball.html 참조)
  let steps=1;
  if(spd>=1){steps=Math.round(spd);}
  else{spdAccum+=spd;if(spdAccum>=1){spdAccum-=1;}else{draw();frameId=requestAnimationFrame(update);return;}}

  for(let s=0;s<steps;s++){
    horses.forEach(h=>{
      if(h.arrived)return;
      h.speedChangeTimer++;
      if(h.speedChangeTimer>=h.speedChangePeriod){
        h.speedChangeTimer=0;h.speedChangePeriod=60+Math.random()*120;
        h.speedMult=Math.max(0.4,Math.min(2.0,h.speedMult+(Math.random()-0.38)*0.5));
      }
      if(h.eventTimer>0){
        h.eventTimer--;
        if(h.eventTimer<=0){
          if(h.eventState==='toilet')addLog(`🏃 ${h.name} 복귀!`,'evt');
          if(h.eventState==='sleep'&&h.sleepBoostPending){h.sleepBoostPending=false;h.speedMult=Math.min(2.5,h.speedMult+1.0);addLog(`⚡ ${h.name} 기력 회복 질주!`,'evt');}
          h.eventState='normal';
        }
      }
      if(h.skillActive){h.skillTimer--;if(h.skillTimer<=0)h.skillActive=false;}
      if(h.shake>0)h.shake--;

      let spd2=h.baseSpeed;
      if(h.eventState==='toilet'||h.eventState==='sleep')spd2=0;
      else{spd2*=h.speedMult;if(h.skillActive){const pr=1-h.skillTimer/240;spd2*=(1+pr*3.0);}}

      h.angle+=spd2;
      h.progress=(h.angle+Math.PI/2)/(Math.PI*2);
      if(h.angle>=(-Math.PI/2+Math.PI*2*(h.lap+1))){h.lap++;if(h.lap<=TOTAL_LAPS)addLog(`🔄 ${h.name} ${h.lap}바퀴!`,'');}

      const lo=-30+h.i*(60/Math.max(1,names.length-1));
      const pos=trackPos(h.angle,lo);
      h.trailPoints.push({x:pos.x,y:pos.y});
      if(h.trailPoints.length>16)h.trailPoints.shift();

      if(h.lap>=TOTAL_LAPS&&!h.arrived){
        h.arrived=true;arrived.push(h);h.rank=arrived.length;
        const sym=h.rank===1?'🥇':h.rank===2?'🥈':h.rank===3?'🥉':`${h.rank}위`;
        addLog(`${sym} ${h.name} 완주! ${h.rank}등!`,'arrive');
        playFinish();spawnGlow(pos.x,pos.y,h.color,16);
        updateRankPanel();
      }
    });
  }
  updateRankPanel();draw();
  if(arrived.length===horses.length&&!gameFinished){gameFinished=true;setTimeout(showResult,800);}
  else frameId=requestAnimationFrame(update);
}

function showResult(){
  document.getElementById('resultItems').innerHTML=arrived.map((h,i)=>{
    const rank=i+1,sym=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}위`;
    const isPass=usePass&&rank<=passN;
    return`<div class="res-item" style="animation-delay:${i*0.06}s;border-left:4px solid ${h.color}">
      <div style="font-family:'Oswald',sans-serif;font-size:18px;min-width:32px;color:${h.color}">${sym}</div>
      <div style="flex:1;font-family:'Black Han Sans',sans-serif;font-size:15px">${h.name}</div>
      ${usePass?`<div style="font-size:11px;padding:2px 8px;border-radius:10px;background:${isPass?'rgba(0,230,118,.2)':'rgba(255,77,77,.2)'};color:${isPass?'#00e676':'#ff4d4d'}">${isPass?'✅합격':'❌탈락'}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('resultOverlay').classList.add('show');
}

function startGame(){
  AC.resume();document.getElementById('startOverlay').style.display='none';
  createHorses();updateRankPanel();addLog('🚩 출발!','arrive');playStart();
  gameRunning=true;frameId=requestAnimationFrame(update);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
</script>
