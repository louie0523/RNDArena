<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 룰렛 — RANDOM ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#08030e;--surface:#110828;--surface2:#1a0d38;--accent:#c864ff;--gold:#f5c518;--text:#f0e8ff;--muted:#7a6a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;flex-shrink:0;background:rgba(0,0,0,0.5);}
.logo{font-family:'Oswald',sans-serif;font-size:20px;font-weight:900;color:var(--accent);text-shadow:0 0 18px rgba(200,100,255,0.7);}
.back-btn{background:rgba(200,100,255,0.1);color:var(--muted);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:none;}
.back-btn:hover{color:var(--text);background:rgba(200,100,255,0.2);}
.game-wrap{display:flex;flex:1;overflow:hidden;align-items:stretch;}
.wheel-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:20px;background:radial-gradient(ellipse at center,rgba(100,30,180,0.12) 0%,transparent 70%);}
.wheel-wrap{position:relative;width:min(420px,58vmin);height:min(420px,58vmin);}
canvas#wheelCanvas{border-radius:50%;display:block;filter:drop-shadow(0 0 30px rgba(200,100,255,0.55)) drop-shadow(0 0 60px rgba(150,50,255,0.3));}
.wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:44px;filter:drop-shadow(0 4px 12px #000) drop-shadow(0 0 10px rgba(200,100,255,1));z-index:10;pointer-events:none;}
.spin-btn{margin-top:20px;background:linear-gradient(135deg,#c864ff,#7b2fff);color:#fff;border:none;padding:14px 52px;border-radius:50px;font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;transition:all .25s;box-shadow:0 4px 28px rgba(200,100,255,.6),0 0 40px rgba(150,50,255,0.2);}
.spin-btn:hover{transform:scale(1.07);box-shadow:0 8px 40px rgba(200,100,255,.8);}
.spin-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.result-so-far{margin-top:14px;font-size:13px;color:var(--muted);text-align:center;max-width:380px;line-height:2.1;}

/* 우측 패널 — 테두리 없이 단색+빛 */
.side{width:260px;background:rgba(14,6,30,0.97);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 24px rgba(100,30,200,0.18);}
.ps{padding:12px 14px;}
.pt{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:2px;color:var(--accent);margin-bottom:7px;text-shadow:0 0 10px rgba(200,100,255,0.5);}
.result-list{overflow-y:auto;flex:1;padding:9px;display:flex;flex-direction:column;gap:5px;}
.res-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:rgba(200,100,255,0.08);border-radius:10px;font-size:14px;animation:slideIn .3s ease forwards;opacity:0;box-shadow:0 2px 12px rgba(200,100,255,0.1);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.res-rank{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;min-width:30px;}
.remaining-list{overflow-y:auto;flex:1;padding:9px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;}
.rem-tag{padding:4px 11px;border-radius:20px;font-size:13px;background:rgba(200,100,255,0.12);transition:all .35s;box-shadow:0 0 8px rgba(200,100,255,0.15);}
.rem-tag.removed{opacity:.2;text-decoration:line-through;box-shadow:none;background:rgba(255,255,255,0.04);}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
.ot{font-family:'Black Han Sans',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);margin-bottom:8px;text-shadow:0 0 20px rgba(200,100,255,0.7);}
.os{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.8;}
.sbtn{background:linear-gradient(135deg,#c864ff,#7b2fff);color:#fff;border:none;padding:14px 46px;border-radius:50px;font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px rgba(200,100,255,.6);}
.sbtn:hover{transform:scale(1.05);box-shadow:0 8px 36px rgba(200,100,255,.8);}

.result-overlay{position:absolute;inset:0;background:rgba(5,2,14,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:24px;overflow-y:auto;}
.result-overlay.show{display:flex;}
.final-item{display:flex;align-items:center;gap:12px;padding:9px 16px;margin-bottom:5px;background:rgba(200,100,255,0.08);border-radius:10px;width:100%;max-width:420px;animation:slideIn .3s ease forwards;opacity:0;box-shadow:0 2px 14px rgba(200,100,255,0.12);}
.cbtn{margin-top:16px;background:rgba(200,100,255,0.1);color:var(--muted);padding:9px 26px;border-radius:7px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none;}
.cbtn:hover{color:var(--text);background:rgba(200,100,255,0.2);}

/* 당첨자 팝업 — 테두리 없이 빛만 */
.winner-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(10,4,22,.96);border-radius:24px;padding:28px 48px;text-align:center;z-index:150;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;box-shadow:0 0 40px rgba(200,100,255,0.6),0 0 80px rgba(150,50,255,0.3);}
.winner-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.winner-name{font-family:'Black Han Sans',sans-serif;font-size:30px;letter-spacing:2px;color:var(--accent);text-shadow:0 0 20px rgba(200,100,255,0.8);}
.winner-rank{font-size:15px;color:var(--muted);margin-top:7px;}
.game-area-container{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* 파티클 캔버스 */
#particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:5;}

/* 패널 구분선 대신 빛 그라디언트 */
.side-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(200,100,255,0.3),transparent);margin:0 10px;}

/* ── 모바일 세로 반응형 ── */
@media(max-width:600px){
  .game-wrap{flex-direction:column;}
  .wheel-area{padding:14px 10px;justify-content:flex-start;padding-top:8px;}
  .wheel-wrap{width:min(300px,82vw);height:min(300px,82vw);}
  .spin-btn{padding:11px 36px;font-size:17px;margin-top:12px;}
  .side{width:100%;height:auto;flex-direction:row;flex-shrink:0;overflow:hidden;background:rgba(14,6,30,0.98);}
  .ps{padding:8px 10px;}
  .result-list{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:5px;min-height:60px;}
  .res-item{min-width:90px;flex-direction:column;gap:2px;padding:5px 7px;font-size:12px;text-align:center;}
  .remaining-list{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;padding:5px;min-height:44px;}
  .rem-tag{white-space:nowrap;font-size:11px;padding:3px 8px;}
  .result-so-far{font-size:11px;max-width:95vw;}
  header{padding:8px 12px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">🎡 룰렛</div>
  <div style="font-size:13px;color:var(--muted);" id="statusMsg">준비중...</div>
  <button class="back-btn" onclick="location.href='index.html'">← 돌아가기</button>
</header>
<div class="game-wrap">
  <div class="game-area-container">
    <canvas id="particleCanvas"></canvas>
    <div class="wheel-area">
      <div class="wheel-wrap">
        <div class="wheel-pointer">▼</div>
        <canvas id="wheelCanvas"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spin()">🎡 돌리기!</button>
      <div class="result-so-far" id="resultSoFar"></div>
    </div>

    <div class="overlay" id="startOverlay">
      <div class="ot">🎡 룰렛</div>
      <div class="os" id="pInfo">참가자 0명<br>바퀴를 돌려 한 명씩 뽑기!<br>뽑힌 순서가 순위가 됩니다</div>
      <button class="sbtn" onclick="startGame()">🎡 시작!</button>
    </div>

    <div class="result-overlay" id="resultOverlay">
      <div style="font-family:'Oswald',sans-serif;font-size:30px;font-weight:900;background:linear-gradient(135deg,#c864ff,#7b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:18px;">🎡 룰렛 결과!</div>
      <div id="finalItems"></div>
      <button class="cbtn" onclick="document.getElementById('resultOverlay').classList.remove('show')">✕ 닫기</button>
    </div>

    <div class="winner-popup" id="winnerPopup">
      <div style="font-size:40px">🎉</div>
      <div class="winner-name" id="winnerName">이름</div>
      <div class="winner-rank" id="winnerRankText">1위 선택!</div>
    </div>
  </div>

  <div class="side">
    <div class="ps"><div class="pt">✅ 선택 결과</div></div>
    <div class="result-list" id="resultListPanel"></div>
    <div class="ps"><div class="pt">⏳ 남은 참가자</div></div>
    <div class="remaining-list" id="remainingList"></div>
  </div>
</div>

<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function sfx(f,d,t='sine',v=.25){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.setValueAtTime(f,AC.currentTime);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
function playTick(){sfx(700,.035,'square',.12);}
function playWin(){[880,1100,1320,1760,2200].forEach((f,i)=>setTimeout(()=>sfx(f,.15,'triangle',.4),i*55));}
function playSpinStart(){sfx(180,.3,'sawtooth',.18);setTimeout(()=>sfx(280,.3,'sawtooth',.13),140);}

const params=new URLSearchParams(location.search);
const names=params.get('names')?params.get('names').split(',').filter(Boolean):['철수','영희','민준','지수','태양'];
const usePass=params.get('usePass')==='true',passN=parseInt(params.get('passN'))||3;
document.getElementById('pInfo').innerHTML=`참가자 ${names.length}명<br>바퀴를 돌려 한 명씩 뽑기!<br>뽑힌 순서가 순위가 됩니다`;

const COLORS=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FC8','#FF9A3C','#C77DFF','#00D4FF','#FF4D6D','#2EC4B6','#FF8C42','#ACE894'];

const wCanvas=document.getElementById('wheelCanvas');
const ctx=wCanvas.getContext('2d');
const pCanvas=document.getElementById('particleCanvas');
const pctx=pCanvas.getContext('2d');
const SIZE=Math.min(420,Math.floor(Math.min(window.innerWidth*0.52,window.innerHeight*0.82)));
wCanvas.width=wCanvas.height=SIZE;
const CX=SIZE/2,CY=SIZE/2,R=SIZE/2-6;

// 파티클 캔버스 리사이즈
function resizeParticleCanvas(){
  const cont=document.querySelector('.game-area-container');
  pCanvas.width=cont.clientWidth;pCanvas.height=cont.clientHeight;
}
window.addEventListener('resize',resizeParticleCanvas);
setTimeout(resizeParticleCanvas,100);

let remaining=[...names],results=[],spinning=false,angle=0,gameStarted=false;
let particles=[],starField=[];

// 별 배경
for(let i=0;i<60;i++)starField.push({x:Math.random(),y:Math.random(),r:0.5+Math.random()*1.2,a:Math.random()});

function drawWheel(){
  ctx.clearRect(0,0,SIZE,SIZE);
  const n=remaining.length;

  // 별 배경 (휠 캔버스 배경)
  ctx.fillStyle='#06030f';ctx.beginPath();ctx.arc(CX,CY,R+6,0,Math.PI*2);ctx.fill();

  if(n===0){
    const g=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
    g.addColorStop(0,'rgba(200,100,255,0.3)');g.addColorStop(1,'rgba(100,0,200,0.15)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(200,100,255,0.8)';ctx.font='bold 18px "Black Han Sans"';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('완료!',CX,CY);
    return;
  }
  const slice=Math.PI*2/n;

  // 외곽 링 (글로우)
  ctx.shadowColor='rgba(200,100,255,0.6)';ctx.shadowBlur=25;
  ctx.beginPath();ctx.arc(CX,CY,R+3,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,100,255,0.7)';ctx.lineWidth=3;ctx.stroke();
  ctx.shadowBlur=0;

  remaining.forEach((name,i)=>{
    const startA=angle+slice*i,endA=startA+slice;
    // 조각 그라데이션
    const midA=startA+slice/2;
    const g=ctx.createRadialGradient(CX+Math.cos(midA)*R*0.4,CY+Math.sin(midA)*R*0.4,0,CX,CY,R);
    const c=COLORS[i%COLORS.length];
    g.addColorStop(0,c+'cc');g.addColorStop(0.6,c);g.addColorStop(1,c+'bb');
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,startA,endA);ctx.closePath();
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;ctx.stroke();

    // 조각 내부 하이라이트
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R*0.95,startA+0.02,endA-0.02);ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();

    // 텍스트
    ctx.save();ctx.translate(CX,CY);ctx.rotate(startA+slice/2);
    ctx.textAlign='right';
    const fontSize=Math.min(15,Math.max(9,190/n));
    ctx.font=`bold ${fontSize}px "Noto Sans KR"`;
    ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=4;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillText(name.length>6?name.slice(0,5)+'…':name,R-7,3);
    ctx.fillStyle='#fff';
    ctx.fillText(name.length>6?name.slice(0,5)+'…':name,R-8,2);
    ctx.shadowBlur=0;ctx.restore();
  });

  // 외곽 장식 점들
  for(let i=0;i<n;i++){
    const a=angle+slice*i;
    const px=CX+Math.cos(a)*R,py=CY+Math.sin(a)*R;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
  }

  // 중심 원 (더 화려하게)
  const cg=ctx.createRadialGradient(CX-8,CY-8,2,CX,CY,30);
  cg.addColorStop(0,'#e090ff');cg.addColorStop(0.5,'#9030ff');cg.addColorStop(1,'#5000c0');
  ctx.shadowColor='rgba(200,100,255,0.8)';ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(CX,CY,28,0,Math.PI*2);
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🎡',CX,CY);
}

// 파티클 드로우 루프
function drawParticles(){
  pctx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.vx*=0.99;p.life-=p.d;
    if(p.life<=0)return false;
    pctx.globalAlpha=p.life;
    pctx.shadowColor=p.c;pctx.shadowBlur=6;
    pctx.beginPath();pctx.arc(p.x,p.y,p.r*Math.sqrt(p.life),0,Math.PI*2);
    pctx.fillStyle=p.c;pctx.fill();
    pctx.shadowBlur=0;
    return true;
  });
  pctx.globalAlpha=1;
  if(gameStarted)requestAnimationFrame(drawParticles);
}

function getSelected(){
  const n=remaining.length;
  if(n===0)return -1;
  const slice=Math.PI*2/n;
  // 포인터는 상단(12시 방향 = -PI/2)
  // 각 조각 i의 시작각도: angle + slice*i
  // 어떤 조각의 중앙이 -PI/2에 가장 가까운지 찾기
  let best=-1, bestDist=Infinity;
  for(let i=0;i<n;i++){
    const midA=angle+slice*i+slice/2;
    // -PI/2와의 각도 차이 (절댓값, 원형)
    let diff=((midA+Math.PI/2)%(Math.PI*2));
    if(diff>Math.PI)diff=Math.PI*2-diff;
    if(diff<bestDist){bestDist=diff;best=i;}
  }
  return best;
}

let lastTickIdx=-1;
function spin(){
  if(spinning||remaining.length===0)return;
  AC.resume();spinning=true;
  document.getElementById('spinBtn').disabled=true;
  playSpinStart();

  const totalRot=Math.PI*2*(7+Math.random()*6)+Math.random()*Math.PI*2;
  const dur=3200+Math.random()*1600;
  const start=performance.now(),initAngle=angle;

  function frame(ts){
    const t=Math.min((ts-start)/dur,1);
    const ease=t<1?1-Math.pow(1-t,4):1;
    angle=initAngle+totalRot*ease;

    const idx=getSelected();
    if(idx!==lastTickIdx){lastTickIdx=idx;if(t<0.97)playTick();}

    drawWheel();

    if(t<1){requestAnimationFrame(frame);}
    else{
      spinning=false;
      const selected=getSelected();
      const winner=remaining[selected];
      results.push(winner);remaining.splice(selected,1);
      lastTickIdx=-1;drawWheel();playWin();
      showWinnerPopup(winner,results.length);
      spawnParticles(pCanvas.width/2,pCanvas.height/2,28);
      updatePanels();
      if(remaining.length===0){
        setTimeout(()=>showFinalResult(),2000);
        document.getElementById('spinBtn').disabled=true;
        document.getElementById('spinBtn').textContent='🏆 완료!';
      }else{
        setTimeout(()=>{document.getElementById('spinBtn').disabled=false;hideWinnerPopup();},1900);
      }
    }
  }
  requestAnimationFrame(frame);
}

let popupTimer=null;
function showWinnerPopup(name,rank){
  const popup=document.getElementById('winnerPopup');
  const sym=rank===1?'🥇 1위':rank===2?'🥈 2위':rank===3?'🥉 3위':`${rank}위`;
  document.getElementById('winnerName').textContent=name;
  document.getElementById('winnerRankText').textContent=`${sym} 선택!`;
  popup.classList.add('show');
  if(popupTimer)clearTimeout(popupTimer);
  popupTimer=setTimeout(()=>popup.classList.remove('show'),1900);
}
function hideWinnerPopup(){document.getElementById('winnerPopup').classList.remove('show');}

function updatePanels(){
  document.getElementById('resultListPanel').innerHTML=results.map((n,i)=>{
    const rank=i+1;
    const sym=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}위`;
    const isPass=usePass&&rank<=passN;
    return`<div class="res-item" style="animation-delay:${i*0.04}s;border-left:3px solid ${COLORS[names.indexOf(n)%COLORS.length]}">
      <div class="res-rank" style="color:${COLORS[names.indexOf(n)%COLORS.length]}">${sym}</div>
      <div style="flex:1;font-family:'Black Han Sans',sans-serif;font-size:14px">${n}</div>
      ${usePass?`<div style="font-size:11px;padding:2px 6px;border-radius:8px;background:${isPass?'rgba(0,230,118,.2)':'rgba(255,77,77,.2)'};color:${isPass?'#00e676':'#ff4d4d'}">${isPass?'합격':'탈락'}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('remainingList').innerHTML=names.map(n=>{
    const done=results.includes(n);
    return`<div class="rem-tag ${done?'removed':''}" style="border-color:${COLORS[names.indexOf(n)%COLORS.length]}55">${n}</div>`;
  }).join('');

  const soFar=results.map((n,i)=>`<span style="color:${COLORS[names.indexOf(n)%COLORS.length]}">${i+1}위: ${n}</span>`).join(' | ');
  document.getElementById('resultSoFar').innerHTML=soFar;
  document.getElementById('statusMsg').textContent=`남은 참가자: ${remaining.length}명`;
}

function spawnParticles(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2.5+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,c:COLORS[Math.floor(Math.random()*COLORS.length)],r:4+Math.random()*5,life:1,d:.016+Math.random()*.02});
  }
}

function showFinalResult(){
  document.getElementById('finalItems').innerHTML=results.map((n,i)=>{
    const rank=i+1,sym=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}위`;
    const c=COLORS[names.indexOf(n)%COLORS.length],isPass=usePass&&rank<=passN;
    return`<div class="final-item" style="animation-delay:${i*0.05}s;border-left:4px solid ${c}">
      <div style="font-family:'Oswald',sans-serif;font-size:18px;min-width:32px;color:${c}">${sym}</div>
      <div style="flex:1;font-family:'Black Han Sans',sans-serif;font-size:15px">${n}</div>
      ${usePass?`<div style="font-size:11px;padding:2px 8px;border-radius:10px;background:${isPass?'rgba(0,230,118,.2)':'rgba(255,77,77,.2)'};color:${isPass?'#00e676':'#ff4d4d'}">${isPass?'✅합격':'❌탈락'}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('resultOverlay').classList.add('show');
}

function startGame(){
  AC.resume();document.getElementById('startOverlay').style.display='none';
  remaining=shuffle([...names]);results=[];
  updatePanels();drawWheel();
  gameStarted=true;
  document.getElementById('spinBtn').disabled=false;
  resizeParticleCanvas();
  requestAnimationFrame(drawParticles);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
</script>
