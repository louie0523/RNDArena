<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 배틀로얄 — RANDOM ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a04;--surface:#0d1108;--accent:#ff8c00;--accent2:#ff4444;--gold:#f5c518;--text:#f0e8d0;--muted:#7a6a50;--border:rgba(200,150,50,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(0,0,0,0.65);}
.logo{font-family:'Oswald',sans-serif;font-size:18px;font-weight:900;color:var(--accent);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;}
.game-wrap{display:flex;flex:1;overflow:hidden;}
canvas#mapCanvas{
  display: block;
  width: 100%;       /* 👈 원하는 비율(%)이나 고정 크기(px)로 설정 */
  height: 100%;    /* 세로는 꽉 차게 유지 */
  margin: 0 auto;   /* 남는 공간이 있을 때 중앙으로 배치 */
}
.side{width:300px;background:rgba(13,17,8,.97);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.ps{padding:13px 18px;border-bottom:1px solid var(--border);}
.pt{font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:2px;color:var(--accent);margin-bottom:9px;}
.alive-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;padding:10px;}
.alive-item{display:flex;align-items:center;gap:9px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:9px;font-size:15px;transition:all .3s;}
.alive-item.dead{opacity:.25;filter:grayscale(1);}
.hp-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.hp-bar{height:100%;border-radius:4px;transition:width .2s;}
.evt-wrap{flex-shrink:0;border-top:1px solid var(--border);display:flex;flex-direction:column;min-height:500px;max-height:500px;}
.evt-log{flex:1;overflow-y:auto;display:flex;flex-direction:column-reverse;padding:12px;}
.log{font-size:14px;color:var(--muted);padding:5px 0;line-height:1.6;border-bottom:1px solid rgba(255,255,255,.03);}
.log.kill{color:#ff4444;}.log.loot{color:#ffd700;}.log.event{color:var(--accent);}.log.supply{color:#ff69b4;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
.ot{font-family:'Black Han Sans',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);margin-bottom:8px;}
.os{font-size:13px;color:var(--muted);margin-bottom:26px;text-align:center;line-height:1.8;}
.sbtn{background:linear-gradient(135deg,#ff8c00,#ff4444);color:#fff;border:none;padding:13px 40px;border-radius:50px;font-family:'Black Han Sans',sans-serif;font-size:19px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.sbtn:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(255,140,0,.5);}
.result-overlay{position:absolute;inset:0;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:200;padding:24px;overflow-y:auto;}
.result-overlay.show{display:flex;}
.ri2{display:flex;align-items:center;gap:12px;padding:9px 16px;margin-bottom:5px;background:rgba(255,255,255,.04);border-radius:9px;width:100%;max-width:420px;animation:sli .3s ease forwards;opacity:0;}
@keyframes sli{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.cbtn{margin-top:16px;background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted);padding:9px 26px;border-radius:7px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;}
.cbtn:hover{color:var(--text);}
.game-container{position:relative;flex:1;display:flex;}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
.spd-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}

/* ── 모바일 가로 강제 ── */
@media(max-width:768px) and (orientation:portrait){
  body{transform:rotate(90deg);transform-origin:left top;width:100vh;height:100vw;overflow:hidden;position:absolute;top:0;left:100%;}
}
@media(max-width:900px){
  .side{width:240px;}
  .alive-item{font-size:13px;padding:6px 10px;}
  .log{font-size:12px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">⚔️ 배틀로얄</div>
  <div style="font-size:13px;color:var(--muted);" id="aliveDisplay">준비중...</div>
  <button class="back-btn" onclick="location.href='index.html'">← 돌아가기</button>
</header>
<div class="game-wrap">
  <div class="game-container">
    <canvas id="mapCanvas"></canvas>
    <div class="overlay" id="startOverlay">
      <div class="ot">⚔️ 배틀로얄</div>
      <div class="os" id="pInfo">참가자 0명</div>
      <button class="sbtn" onclick="startGame()">✈️ 강하!</button>
    </div>
    <div class="result-overlay" id="resultOverlay">
      <div style="font-family:'Oswald',sans-serif;font-size:30px;font-weight:900;background:linear-gradient(135deg,#f5c518,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:18px;">🏆 배틀로얄 결과!</div>
      <div id="resultItems"></div>
      <button class="cbtn" onclick="document.getElementById('resultOverlay').classList.remove('show')">✕ 닫기</button>
    </div>
  </div>
  <div class="side">
    <div class="ps">
      <div class="pt">⚡ 속도</div>
      <input type="range" id="spd" min="0.05" max="3" step="0.05" value="0.4">
      <div class="spd-row"><span>느림</span><span id="spdLabel">0.4x</span><span>빠름</span></div>
    </div>
    <div class="ps"><div class="pt">👥 생존자</div></div>
    <div class="alive-list" id="aliveList"></div>
    <div class="evt-wrap">
      <div class="ps" style="padding:8px 14px;"><div class="pt" style="margin-bottom:0">📢 전황</div></div>
      <div class="evt-log" id="evtLog"></div>
    </div>
  </div>
</div>

<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function sfx(freq,dur,type='square',vol=0.25){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);o.start();o.stop(AC.currentTime+dur);}catch(e){}}
function playSFX(type){
  if(type==='gunshot'){sfx(800,.05,'square',.3);setTimeout(()=>sfx(200,.1,'sawtooth',.2),40);}
  else if(type==='kill'){sfx(300,.08,'square',.4);setTimeout(()=>sfx(150,.2,'sawtooth',.3),70);}
  else if(type==='loot'){sfx(600,.05,'sine',.2);setTimeout(()=>sfx(800,.1,'sine',.2),60);}
  else if(type==='supply'){[440,550,660,880].forEach((f,i)=>setTimeout(()=>sfx(f,.15,'triangle',.35),i*60));}
  else if(type==='event'){sfx(350,.1,'sine',.2);}
}

// 속도 슬라이더
const spdEl=document.getElementById('spd');
const spdLbl=document.getElementById('spdLabel');
spdEl.addEventListener('input',()=>{spdLbl.textContent=parseFloat(spdEl.value).toFixed(2).replace(/\.?0+$/,'')+'x';});
function getSpeed(){return parseFloat(spdEl.value);}

const params=new URLSearchParams(location.search);
const names=params.get('names')?params.get('names').split(',').filter(Boolean):['철수','영희','민준','지수','태양','현우'];
const usePass=params.get('usePass')==='true',passN=parseInt(params.get('passN'))||3;
document.getElementById('pInfo').innerHTML=`참가자 ${names.length}명<br>산악 지형에 낙하산으로 강하!<br>파밍 후 마지막 생존자가 1위!`;

const canvas=document.getElementById('mapCanvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){const c=canvas.parentElement;W=canvas.width=c.clientWidth;H=canvas.height=c.clientHeight;}
resize();window.addEventListener('resize',resize);

const COLORS=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FC8','#FF9A3C','#C77DFF','#00D4FF','#FF4D6D','#2EC4B6','#FF8C42','#ACE894'];
const GUNS={
  pistol:{name:'권총',range:100,dmg:25,moveSpd:1.2,miss:0.2,emoji:'🔫'},
  rifle:{name:'소총',range:180,dmg:40,moveSpd:1.0,miss:0.1,emoji:'🏹'},
  sniper:{name:'저격총',range:320,dmg:80,moveSpd:0.5,miss:0.3,emoji:'🎯'},
};
const MELEE={
  frying:{name:'후라이팬',dmg:50,emoji:'🍳'},
  bbatta:{name:'빠따',dmg:60,emoji:'🏏'},
  sashimi:{name:'사시미',dmg:75,emoji:'🔪'},
};
const ARMORS={
  light:{name:'경갑옷',def:15,emoji:'🧥'},
  heavy:{name:'중갑옷',def:30,emoji:'🛡️'},
};
const HEALS={
  bandage:{name:'붕대',hp:25,emoji:'🩹'},
  medkit:{name:'의약품',hp:60,emoji:'💊'},
};

let terrain=[],mountains=[],items=[],bullets=[],particles=[],rankings=[],shockwaves=[];
let players=[],gameRunning=false,gameFinished=false,frameId=null;
let supplyTimer=0,supplyInterval=400,gameTime=0;
let lastRandEvt=0;

// 구름/안개
let cloudParticles=[];

function buildTerrain(){
  mountains=[];
  const mCount=8+Math.floor(names.length/3);
  for(let i=0;i<mCount;i++){
    mountains.push({
      x:80+Math.random()*(W-160),y:80+Math.random()*(H-160),
      w:70+Math.random()*120,h:50+Math.random()*90,
      color:`hsl(${90+Math.random()*30},${25+Math.random()*20}%,${18+Math.random()*12}%)`,
      snowRatio:0.25+Math.random()*0.2,
    });
  }
  terrain=[];
  for(let i=0;i<70;i++){terrain.push({x:Math.random()*W,y:Math.random()*H,type:'tree',r:7+Math.random()*9,sway:Math.random()*Math.PI*2});}
  for(let i=0;i<35;i++){terrain.push({x:Math.random()*W,y:Math.random()*H,type:'rock',r:9+Math.random()*15});}
  // 구름
  for(let i=0;i<8;i++){
    cloudParticles.push({x:Math.random()*W,y:20+Math.random()*80,w:60+Math.random()*100,h:20+Math.random()*30,alpha:0.06+Math.random()*0.08,spd:0.2+Math.random()*0.3});
  }
}

function spawnItems(count=15){
  for(let i=0;i<count;i++){
    const roll=Math.random();
    let type,data;
    if(roll<0.35){type='gun';const keys=Object.keys(GUNS);const k=keys[Math.floor(Math.random()*keys.length)];data={...GUNS[k],key:k};}
    else if(roll<0.55){type='armor';const keys=Object.keys(ARMORS);const k=keys[Math.floor(Math.random()*keys.length)];data={...ARMORS[k],key:k};}
    else{type='heal';const keys=Object.keys(HEALS);const k=keys[Math.floor(Math.random()*keys.length)];data={...HEALS[k],key:k};}
    items.push({x:30+Math.random()*(W-60),y:30+Math.random()*(H-60),type,data,visible:true,glow:0,pulse:Math.random()*Math.PI*2});
  }
}

function dropSupply(){
  const roll=Math.random();let data;
  if(roll<0.5){const keys=Object.keys(GUNS);const k=keys[Math.floor(Math.random()*keys.length)];data={...GUNS[k],key:k,type:'gun'};}
  else{const keys=Object.keys(MELEE);const k=keys[Math.floor(Math.random()*keys.length)];data={...MELEE[k],key:k,type:'melee'};}
  const sx=80+Math.random()*(W-160),sy=80+Math.random()*(H-160);
  addLog(`📦 보급품 강하! ${data.name||data.key}!`,'supply');
  playSFX('supply');
  items.push({x:sx,y:sy,type:data.type,data,visible:true,glow:25,isSupply:true,pulse:0});
  spawnShockwave(sx,sy,'#ff69b4',60);
  for(let i=0;i<15;i++)spawnParticle(sx,sy,'#ff69b4',3+Math.random()*5);
}

function createPlayers(){
  players=names.map((name,i)=>({
    name,i,x:80+Math.random()*(W-160),y:80+Math.random()*(H-160),
    hp:100,maxHp:100,color:COLORS[i%COLORS.length],
    gun:null,melee:null,armor:null,heals:[],
    state:'parachute',parachuteY:-40+i*25,
    targetX:80+Math.random()*(W-160),targetY:80+Math.random()*(H-160),
    moveTimer:0,movePeriod:40+Math.random()*80,
    combatTimer:0,healTimer:0,rank:0,alive:true,
    vx:0,vy:0,hitFlash:0,bobTimer:Math.random()*Math.PI*2,
  }));
  rankings=[];
}

function movePlayer(p){
  if(!p.alive||p.state!=='alive')return;
  p.moveTimer++;
  if(p.moveTimer>p.movePeriod){
    p.moveTimer=0;p.movePeriod=40+Math.random()*80;
    const nearItem=items.filter(it=>it.visible).sort((a,b)=>dist(p,a)-dist(p,b))[0];
    const enemies=players.filter(e=>e.alive&&e!==p);
    const nearEnemy=enemies.sort((a,b)=>dist(p,a)-dist(p,b))[0];
    let tx=p.targetX,ty=p.targetY;
    if(nearItem&&dist(p,nearItem)<180){tx=nearItem.x;ty=nearItem.y;}
    else if(nearEnemy&&canFight(p,nearEnemy)){tx=nearEnemy.x;ty=nearEnemy.y;}
    else{tx=40+Math.random()*(W-80);ty=40+Math.random()*(H-80);}
    p.targetX=tx;p.targetY=ty;
  }
  const moveSpd=(p.gun?p.gun.moveSpd:1.0)*1.3;
  const dx=p.targetX-p.x,dy=p.targetY-p.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>5){p.vx=dx/d*moveSpd;p.vy=dy/d*moveSpd;p.x+=p.vx;p.y+=p.vy;}
  p.x=Math.max(15,Math.min(W-15,p.x));
  p.y=Math.max(15,Math.min(H-15,p.y));
  p.bobTimer+=0.08;
}

function tryLoot(p){
  if(!p.alive||p.state!=='alive')return;
  const near=items.filter(it=>it.visible&&dist(p,it)<30);
  near.forEach(item=>{
    item.visible=false;
    if(item.type==='gun'){if(!p.gun||(item.data.dmg>p.gun.dmg)){p.gun=item.data;addLog(`🔫 ${p.name} ${item.data.name} 획득!`,'loot');playSFX('loot');}}
    else if(item.type==='melee'){p.melee=item.data;addLog(`⚔️ ${p.name} ${item.data.name} 획득!`,'loot');playSFX('loot');}
    else if(item.type==='armor'){if(!p.armor||(item.data.def>p.armor.def)){p.armor=item.data;addLog(`🛡️ ${p.name} ${item.data.name} 획득!`,'loot');playSFX('loot');}}
    else if(item.type==='heal'){p.heals.push(item.data);addLog(`💊 ${p.name} ${item.data.name} 획득!`,'loot');playSFX('loot');}
  });
}

function canFight(a,b){
  if(!a.alive||!b.alive)return false;
  const range=a.gun?a.gun.range:(a.melee?55:45);
  return dist(a,b)<range;
}

function fight(a,b){
  if(!a.alive||!b.alive||a.combatTimer>0)return;
  const missChance=a.gun?a.gun.miss:0;
  if(Math.random()<missChance){addLog(`💨 ${a.name}의 공격 빗나감!`,'');playSFX('gunshot');a.combatTimer=50;return;}
  let dmg=a.gun?a.gun.dmg:(a.melee?a.melee.dmg:15);
  if(b.armor)dmg=Math.max(5,dmg-b.armor.def);
  b.hp-=dmg;
  b.hitFlash=10;
  playSFX('gunshot');
  const weapon=a.gun?a.gun.name:(a.melee?a.melee.name:'맨손');
  addLog(`💥 ${a.name}→${b.name} ${weapon} -${dmg}hp`,dmg>=60?'kill':'');
  spawnBullet(a.x,a.y,b.x,b.y,a.color);
  spawnParticle(b.x,b.y,'#ff4444',4);
  spawnShockwave(b.x,b.y,b.color,20);
  a.combatTimer=60;
  if(b.hp<=0){
    killPlayer(b,a.name);
    if(b.gun)items.push({x:b.x+Math.random()*20-10,y:b.y+Math.random()*20-10,type:'gun',data:b.gun,visible:true,glow:12,pulse:0});
    if(b.armor)items.push({x:b.x+Math.random()*20-10,y:b.y+Math.random()*20-10,type:'armor',data:b.armor,visible:true,glow:12,pulse:0});
    b.heals.forEach(h=>items.push({x:b.x+Math.random()*20-10,y:b.y+Math.random()*20-10,type:'heal',data:h,visible:true,glow:12,pulse:0}));
  }
}

function killPlayer(p,killer){
  p.alive=false;p.state='dead';p.hp=0;
  rankings.unshift(p.name);p.rank=players.length-rankings.length+1;
  addLog(`💀 ${p.name}이(가) ${killer}에게 처치당했습니다!`,'kill');
  playSFX('kill');
  spawnParticle(p.x,p.y,'#ff4444',12);
  spawnShockwave(p.x,p.y,'#ff4444',50);
  updatePanel();
}

function tryHeal(p){
  if(!p.alive||p.hp>=p.maxHp*0.88||!p.heals.length)return;
  p.healTimer++;
  if(p.healTimer<100)return;
  p.healTimer=0;
  const heal=p.heals.shift();
  p.hp=Math.min(p.maxHp,p.hp+heal.hp);
  addLog(`💊 ${p.name} ${heal.name} +${heal.hp}hp`,'event');
}

function tryRandomEvent(){
  const now=Date.now();
  if(now-lastRandEvt<5000)return;
  const alive=players.filter(p=>p.alive);
  if(!alive.length)return;
  if(Math.random()>0.018)return;
  lastRandEvt=now;
  const p=alive[Math.floor(Math.random()*alive.length)];
  const roll=Math.random();
  if(roll<0.3){p.hp=Math.max(1,p.hp-20);addLog(`🤸 ${p.name} 걷다가 넘어졌습니다! -20hp`,'event');playSFX('event');}
  else if(roll<0.6){p.hp=Math.min(p.maxHp,p.hp+15);addLog(`🌊 ${p.name} 샘물 발견! +15hp`,'event');playSFX('event');}
  else{addLog(`🔥 ${p.name} 낙뢰! -30hp`,'event');p.hp=Math.max(1,p.hp-30);playSFX('kill');}
}

function spawnParticle(x,y,color,count){
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color,r:2+Math.random()*3,life:1,decay:.03+Math.random()*.03});}
}
function spawnBullet(x1,y1,x2,y2,color){bullets.push({x:x1,y:y1,tx:x2,ty:y2,color,life:1});}
function spawnShockwave(x,y,c,maxR){shockwaves.push({x,y,c,r:4,maxR,life:1});}

function updateBullets(){bullets=bullets.filter(b=>{b.life-=0.12;b.x+=(b.tx-b.x)*0.35;b.y+=(b.ty-b.y)*0.35;return b.life>0;});}
function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.decay;return p.life>0;});}
function updateShockwaves(){shockwaves=shockwaves.filter(s=>{s.r+=2;s.life-=0.05;return s.life>0;});}

function draw(){
  ctx.clearRect(0,0,W,H);

  // 하늘
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d1a24');sky.addColorStop(0.45,'#152a18');sky.addColorStop(1,'#060f04');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // 빛줄기 (분위기)
  ctx.save();
  ctx.globalAlpha=0.04;
  for(let i=0;i<5;i++){
    const lx=W*0.1+i*(W*0.2);
    const lg=ctx.createLinearGradient(lx,0,lx+60,H);
    lg.addColorStop(0,'rgba(150,230,100,0)');lg.addColorStop(0.3,'rgba(150,230,100,0.8)');lg.addColorStop(1,'rgba(150,230,100,0)');
    ctx.fillStyle=lg;
    ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx+60,H);ctx.lineTo(lx+80,H);ctx.lineTo(lx+20,0);ctx.fill();
  }
  ctx.restore();

  // 구름
  cloudParticles.forEach(c=>{
    c.x+=c.spd;if(c.x>W+100)c.x=-100;
    ctx.globalAlpha=c.alpha;
    ctx.fillStyle='rgba(180,220,180,1)';
    ctx.beginPath();ctx.ellipse(c.x,c.y,c.w,c.h,0,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // 산 (그림자+눈)
  mountains.forEach(m=>{
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(m.x-m.w/2,m.y+m.h/2);ctx.lineTo(m.x,m.y-m.h/2);ctx.lineTo(m.x+m.w/2,m.y+m.h/2);ctx.closePath();
    ctx.fillStyle=m.color;ctx.fill();ctx.shadowBlur=0;
    // 눈
    const sy=m.y-m.h/2+m.h*m.snowRatio;
    ctx.beginPath();ctx.moveTo(m.x-m.w*m.snowRatio,sy);ctx.lineTo(m.x,m.y-m.h/2);ctx.lineTo(m.x+m.w*m.snowRatio,sy);
    ctx.fillStyle='rgba(240,248,255,0.85)';ctx.fill();
  });

  // 지형
  terrain.forEach(t=>{
    if(t.type==='tree'){
      t.sway+=0.01;
      const sx=Math.sin(t.sway)*1.5;
      // 나무 줄기
      ctx.fillStyle='rgba(60,30,10,0.8)';ctx.fillRect(t.x-2+sx,t.y,4,t.r);
      // 나뭇잎 (여러 레이어)
      const layers=3;
      for(let l=0;l<layers;l++){
        const lr=t.r*(1.2-l*0.25);const ly=t.y-l*t.r*0.4;
        ctx.beginPath();ctx.arc(t.x+sx,ly,lr,0,Math.PI*2);
        ctx.fillStyle=`rgba(${25+l*5},${80+l*15},${15+l*5},${0.85-l*0.1})`;ctx.fill();
        ctx.strokeStyle='rgba(30,60,10,0.4)';ctx.lineWidth=0.5;ctx.stroke();
      }
    }else{
      // 바위 (입체감)
      const rg=ctx.createRadialGradient(t.x-t.r*0.3,t.y-t.r*0.3,1,t.x,t.y,t.r);
      rg.addColorStop(0,'rgba(110,100,90,0.9)');rg.addColorStop(1,'rgba(60,55,50,0.85)');
      ctx.beginPath();ctx.ellipse(t.x,t.y,t.r,t.r*0.65,0,0,Math.PI*2);
      ctx.fillStyle=rg;ctx.fill();
      ctx.strokeStyle='rgba(80,70,60,0.5)';ctx.lineWidth=1;ctx.stroke();
    }
  });

  // 충격파
  shockwaves.forEach(s=>{
    ctx.globalAlpha=s.life*0.5;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.strokeStyle=s.c;ctx.lineWidth=2;ctx.stroke();
  });ctx.globalAlpha=1;

  // 아이템 (펄스 글로우)
  items.filter(it=>it.visible).forEach(it=>{
    it.pulse+=0.07;
    const glow=it.glow+Math.sin(it.pulse)*4;
    if(glow>0){ctx.shadowColor=it.isSupply?'#ff69b4':'#ffd700';ctx.shadowBlur=glow+5;}
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.data.emoji,it.x,it.y);
    ctx.shadowBlur=0;
    if(it.glow>0)it.glow=Math.max(0,it.glow-.15);
  });

  // 총알 (트레일 효과)
  bullets.forEach(b=>{
    ctx.globalAlpha=b.life;
    ctx.shadowColor=b.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,3*b.life,0,Math.PI*2);
    ctx.fillStyle=b.color;ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  });

  // 파티클
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();});ctx.globalAlpha=1;

  // 플레이어
  players.forEach(p=>{
    if(p.state==='parachute'){
      ctx.save();ctx.shadowColor=p.color;ctx.shadowBlur=8;
      ctx.font='22px serif';ctx.textAlign='center';ctx.fillText('🪂',p.x,p.parachuteY);
      ctx.shadowBlur=0;ctx.fillStyle=p.color;ctx.font='bold 11px "Noto Sans KR"';
      ctx.fillText(p.name,p.x,p.parachuteY+18);ctx.restore();return;
    }
    if(!p.alive){
      ctx.globalAlpha=0.25;ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💀',p.x,p.y);ctx.globalAlpha=1;return;
    }

    // 히트 플래시
    if(p.hitFlash>0){ctx.shadowColor=p.color;ctx.shadowBlur=20+p.hitFlash;p.hitFlash--;}

    const bob=Math.sin(p.bobTimer)*2;

    // HP 바
    const bw=36;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(p.x-bw/2,p.y-26+bob,bw,7);
    const hpPct=p.hp/p.maxHp;
    const hpC=hpPct>0.6?'#4caf50':hpPct>0.3?'#ff9800':'#f44336';
    ctx.fillStyle=hpC;ctx.shadowColor=hpC;ctx.shadowBlur=4;
    ctx.fillRect(p.x-bw/2,p.y-26+bob,bw*hpPct,7);ctx.shadowBlur=0;

    // 이름
    ctx.fillStyle='rgba(0,0,0,0.8)';const nw=p.name.length*7+12;
    ctx.fillRect(p.x-nw/2,p.y-36+bob,nw,14);
    ctx.fillStyle=p.color;ctx.font='bold 10px "Noto Sans KR"';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(p.name.length>5?p.name.slice(0,4)+'…':p.name,p.x,p.y-35+bob);

    // 캐릭터 (더 선명하게)
    ctx.save();
    ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y-6+bob,8,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
    ctx.beginPath();
    ctx.moveTo(p.x,p.y+2+bob);ctx.lineTo(p.x-7,p.y+18+bob);ctx.lineTo(p.x+7,p.y+18+bob);
    ctx.moveTo(p.x-5,p.y+10+bob);ctx.lineTo(p.x+5,p.y+10+bob);
    ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();

    // 무기/방어구
    if(p.gun||p.melee){ctx.font='13px serif';ctx.textAlign='center';ctx.fillText(p.gun?p.gun.emoji:p.melee.emoji,p.x+12,p.y-2+bob);}
    if(p.armor){ctx.font='11px serif';ctx.fillText(p.armor.emoji,p.x-12,p.y-2+bob);}

    ctx.shadowBlur=0;
  });
}

function updatePanel(){
  const sorted=[...players].sort((a,b)=>{if(a.alive!==b.alive)return a.alive?-1:1;return b.hp-a.hp;});
  document.getElementById('aliveList').innerHTML=sorted.map(p=>`
    <div class="alive-item ${!p.alive?'dead':''}">
      <div style="color:${p.color};font-size:14px;min-width:22px;">${p.alive?'🟢':'💀'}</div>
      <div style="flex:1;font-size:15px;">${p.name.length>7?p.name.slice(0,6)+'…':p.name}</div>
      <div class="hp-bar-wrap"><div class="hp-bar" style="width:${p.hp/p.maxHp*100}%;background:${p.hp>60?'#4caf50':p.hp>30?'#ff9800':'#f44336'}"></div></div>
      <div style="font-size:14px;color:var(--muted);min-width:36px;text-align:right">${p.alive?p.hp:0}</div>
    </div>`).join('');
  document.getElementById('aliveDisplay').textContent=`생존: ${players.filter(p=>p.alive).length}/${players.length}`;
}

function addLog(msg,type=''){
  const log=document.getElementById('evtLog');
  const el=document.createElement('div');el.className='log'+(type?' '+type:'');el.textContent=msg;
  log.prepend(el);if(log.children.length>60)log.removeChild(log.lastChild);
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

let parachuteTimer=0,spdAccum=0;
function update(){
  const speed=getSpeed();
  spdLbl.textContent=speed.toFixed(2).replace(/\.?0+$/,'')+'x';
  gameTime++;parachuteTimer++;

  // 낙하산 강하
  players.forEach(p=>{
    if(p.state==='parachute'){
      p.parachuteY+=2*Math.max(1,speed);
      if(p.parachuteY>=p.y){p.state='alive';addLog(`⬇️ ${p.name} 강하!`,'event');}
    }
  });

  // 속도 누적 방식 (실시간 적용)
  let steps=1;
  if(speed>=1)steps=Math.round(speed);
  else{spdAccum+=speed;if(spdAccum>=1){spdAccum-=1;}else{updateBullets();updateParticles();updateShockwaves();draw();frameId=requestAnimationFrame(update);return;}}

  for(let s=0;s<steps;s++){
    if(parachuteTimer*speed<70){continue;}

    supplyTimer++;
    if(supplyTimer>=supplyInterval/speed){supplyTimer=0;supplyInterval=Math.max(180,supplyInterval-15);dropSupply();}

    tryRandomEvent();

    players.forEach(p=>{
      if(!p.alive||p.state!=='alive')return;
      if(p.combatTimer>0)p.combatTimer--;
      movePlayer(p);tryLoot(p);tryHeal(p);
      const enemies=players.filter(e=>e.alive&&e!==p&&canFight(p,e));
      if(enemies.length>0)fight(p,enemies[0]);
    });
  }

  updateBullets();updateParticles();updateShockwaves();
  updatePanel();draw();

  const alive=players.filter(p=>p.alive);
  if(alive.length<=1&&!gameFinished){
    gameFinished=true;
    if(alive.length===1){alive[0].rank=1;rankings=[alive[0].name,...rankings];}
    setTimeout(showResult,800);return;
  }
  frameId=requestAnimationFrame(update);
}

function showResult(){
  // rankings: unshift 방식으로 쌓임 = [마지막생존자, ..., 첫탈락자]
  // 즉 rankings[0]이 1위(마지막 생존자), rankings[마지막]이 꼴등(첫 탈락)
  // .reverse() 제거 — 그대로 사용
  const finalOrder=rankings.slice();
  document.getElementById('resultItems').innerHTML=finalOrder.map((name,i)=>{
    const rank=i+1,sym=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}위`;
    const color=COLORS[names.indexOf(name)%COLORS.length];
    const isPass=usePass&&rank<=passN;
    return`<div class="ri2" style="animation-delay:${i*0.06}s;border-left:4px solid ${color}">
      <div style="font-family:'Oswald',sans-serif;font-size:18px;min-width:32px;color:${color}">${sym}</div>
      <div style="flex:1;font-family:'Black Han Sans',sans-serif;font-size:15px">${name}</div>
      ${usePass?`<div style="font-size:11px;padding:2px 8px;border-radius:10px;background:${isPass?'rgba(0,230,118,.2)':'rgba(255,77,77,.2)'};color:${isPass?'#00e676':'#ff4d4d'}">${isPass?'✅합격':'❌탈락'}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('resultOverlay').classList.add('show');
}

function startGame(){
  AC.resume();document.getElementById('startOverlay').style.display='none';
  buildTerrain();spawnItems(20);createPlayers();updatePanel();
  addLog('✈️ 전원 낙하산 강하 시작!','event');
  gameRunning=true;frameId=requestAnimationFrame(update);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
